<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CareerOps Clipper</title>
  <style>
    body {
      width: 320px;
      background: #0b0e14;
      color: white;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      padding: 0;
      margin: 0;
      overflow: hidden;
    }

    .card {
      padding: 24px;
      border: 1px solid #1e293b;
      background: linear-gradient(145deg, #0f172a, #020617);
    }

    .header {
      color: #3b82f6;
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.25em;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header::before {
      content: "";
      width: 4px;
      height: 4px;
      background: #3b82f6;
      border-radius: 50%;
      box-shadow: 0 0 8px #3b82f6;
    }

    .field {
      margin-bottom: 16px;
      position: relative;
    }

    label {
      display: block;
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      color: #64748b;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }

    input {
      width: 100%;
      background: #151b23;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 12px;
      color: white;
      font-size: 13px;
      outline: none;
      box-sizing: border-box;
      transition: all 0.4s ease;
      opacity: 1;
    }

    input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 15px rgba(59, 130, 246, 0.15);
      background: #1e293b;
    }

    /* 🦴 SKELETON LOADING EFFECT */
    .skeleton {
      pointer-events: none;
    }

    .skeleton input {
      color: transparent !important;
      background: #151b23 !important;
      border-color: #1e293b !important;
      overflow: hidden;
      position: relative;
    }

    .skeleton input::after {
      content: "";
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      transform: translateX(-100%);
      background: linear-gradient(
        90deg,
        rgba(255, 255, 255, 0) 0,
        rgba(255, 255, 255, 0.03) 20%,
        rgba(255, 255, 255, 0.06) 60%,
        rgba(255, 255, 255, 0)
      );
      animation: shimmer 1.5s infinite;
    }

    @keyframes shimmer {
      100% {
        transform: translateX(100%);
      }
    }

    button {
      width: 100%;
      background: #2563eb;
      color: white;
      border: none;
      padding: 14px;
      border-radius: 12px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 10px;
    }

    button:hover {
      background: #3b82f6;
      transform: translateY(-1px);
      box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
    }

    button:disabled {
      background: #1e293b;
      color: #475569;
      cursor: not-allowed;
      box-shadow: none;
    }

    .save-container {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    #saveBtn {
      flex: 1;
      margin-top: 0;
    }

    #favBtn {
      width: 54px;
      height: 54px;
      background: #151b23;
      border: 1px solid #334155;
      color: #334155;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      cursor: pointer;
      transition: all 0.3s;
      padding: 0;
    }

    #favBtn.active {
      background: rgba(234, 179, 8, 0.1);
      border-color: #eab308;
      color: #eab308;
      box-shadow: 0 0 15px rgba(234, 179, 8, 0.3);
      text-shadow: 0 0 8px rgba(234, 179, 8, 0.6);
    }

    #status {
      font-size: 11px;
      margin-top: 16px;
      text-align: center;
      color: #94a3b8;
      font-weight: 600;
      min-height: 1.2em;
    }

    .success {
      color: #10b981 !important;
      font-weight: 700;
    }

    .error {
      color: #000000 !important;
      background: #f43f5e;
      padding: 6px 12px;
      border-radius: 6px;
      font-weight: 800;
      display: inline-block;
      box-shadow: 0 2px 8px rgba(244, 63, 94, 0.4);
    }

    /* 🔌 SESSION INFO BAR */
    .session-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      background: rgba(15, 23, 42, 0.8);
      border-radius: 8px;
      margin-bottom: 12px;
      border: 1px solid rgba(59, 130, 246, 0.2);
    }

    .user-info {
      font-size: 10px;
      color: #94a3b8;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 180px;
    }

    #logoutBtn {
      background: none;
      border: none;
      padding: 4px;
      margin: 0;
      width: auto;
      color: #64748b;
      cursor: pointer;
      display: flex;
      align-items: center;
      transition: color 0.3s;
    }

    #logoutBtn:hover {
      color: #f43f5e;
      background: none;
      box-shadow: none;
      transform: none;
    }

    /* 💡 TIP BOX DESIGN SYSTEM - ALERTA VISUAL */
    .tip-box {
      margin-top: 12px;
      padding: 10px 14px;
      background: rgba(251, 191, 36, 0.1);
      border: 1px solid rgba(251, 191, 36, 0.3);
      border-radius: 8px;
      text-align: center;
      transition: all 0.3s ease;
    }

    .tip-text {
      font-size: 11px;
      color: #fbbf24;
      font-weight: 600;
      letter-spacing: 0px;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      line-height: 1.4;
    }
  </style>
</head>

<body>
  <div class="card" id="card">
    <div class="header">CareerOps Clipper</div>

    <!-- Contenedor con clase skeleton inicial -->
    <div id="loadingOverlay" class="skeleton">
      <div class="field">
        <label>Puesto / Cargo</label>
        <input type="text" id="title" placeholder="Cargando..." readonly>
      </div>

      <div class="field">
        <label>Empresa</label>
        <input type="text" id="company" placeholder="Cargando..." readonly>
      </div>

      <div class="field">
        <label>Rango Salarial</label>
        <input type="text" id="salary" placeholder="Cargando..." readonly>
      </div>
    </div>

    <div class="save-container">
      <button id="saveBtn" disabled>Enviar a Tablero</button>
      <button id="favBtn" title="Marcar como favorito">★</button>
    </div>
    <div class="session-bar" id="sessionBar" style="display: none;">
      <div class="user-info">
        👤 <span id="userEmail">Cargando...</span>
      </div>
      <button id="logoutBtn" title="Cerrar sesión en Clipper">🚪</button>
    </div>

    <div id="status">Buscando datos de la vacante...</div>

    <div class="tip-box">
      <p class="tip-text">
        <span>💡</span> Si LinkedIn no carga automáticamente las ofertas, actualizar el navegador
      </p>
    </div>
  </div>
  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>

</html>
